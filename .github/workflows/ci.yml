name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CRATE_NAME: hubuum
  GITHUB_TOKEN: ${{ github.token }}
  RUST_BACKTRACE: 1
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/hubuum_rust_test
  HUBUUM_DATABASE_URL: postgres://postgres:postgres@localhost:5432/hubuum_rust_test
  HUBUUM_DB_TEST_PASSWORD: postgres

jobs:
  lint:
    name: Lint
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install clippy
        run: rustup component add clippy
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          config: '.markdownlint.json'
          globs: '**/*.md'

  release-metadata:
    name: Release metadata
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Make release scripts executable
        run: chmod +x scripts/*.sh
      - name: Check version bump hygiene
        run: ./scripts/check-version-bump.sh

  openapi-contract:
    name: OpenAPI contract
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Generate OpenAPI JSON
        run: cargo run --bin hubuum-openapi --locked > /tmp/openapi.json
      - name: Validate OpenAPI semantics
        run: "cargo test --lib 'api::openapi::tests::' --locked"
      - name: Check OpenAPI drift
        id: openapi_drift
        continue-on-error: true
        shell: bash
        run: |
          if diff -u docs/openapi.json /tmp/openapi.json > /tmp/openapi.diff; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Flag OpenAPI drift
        if: steps.openapi_drift.outputs.drift == 'true'
        shell: bash
        run: |
          echo "::warning title=OpenAPI drift detected::Generated OpenAPI differs from docs/openapi.json. Build and publish continue, but docs/openapi.json should be updated."
          {
            echo "### OpenAPI drift detected"
            echo ""
            echo "Generated OpenAPI differs from \`docs/openapi.json\`."
            echo "Build and publish continue, but the spec file should be refreshed and committed."
            echo ""
            echo "<details><summary>Diff (first 200 lines)</summary>"
            echo ""
            echo '```diff'
            sed -n '1,200p' /tmp/openapi.diff
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload OpenAPI drift diff
        if: steps.openapi_drift.outputs.drift == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openapi-diff
          path: /tmp/openapi.diff
      - name: Prepare OpenAPI artifact
        run: cp /tmp/openapi.json openapi.json
      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-json
          path: openapi.json

  feature-matrix:
    name: Detect feature permutations
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Install feature build dependencies
        run: |
          sudo apt-get update --yes
          sudo apt-get install --yes libssl-dev
      - name: Detect valid feature permutations
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t features < <(
            cargo metadata --no-deps --format-version 1 \
              | jq -r '.packages[] | select(.name=="hubuum") | .features | keys[]' \
              | grep -v '^default$' \
              | sort
          )

          combos=("")
          for feature in "${features[@]}"; do
            current=("${combos[@]}")
            for combo in "${current[@]}"; do
              if [[ -z "$combo" ]]; then
                combos+=("$feature")
              else
                combos+=("$combo,$feature")
              fi
            done
          done

          matrix='[]'

          add_if_valid () {
            local name="$1"
            local args="$2"
            local -a args_arr=()
            if [[ -n "$args" ]]; then
              read -r -a args_arr <<<"$args"
            fi

            if cargo check --quiet --locked "${args_arr[@]}"; then
              matrix="$(jq --arg name "$name" --arg args "$args" '. + [{name:$name,args:$args}]' <<<"$matrix")"
            else
              echo "Skipping invalid feature set: $name"
            fi
          }

          add_if_valid "default" ""
          add_if_valid "no-default-features" "--no-default-features"

          for combo in "${combos[@]}"; do
            [[ -z "$combo" ]] && continue
            add_if_valid "$combo" "--no-default-features -F $combo"
          done

          echo "Detected feature matrix:"
          echo "$matrix" | jq .
          {
            echo "matrix<<EOF"
            echo "$matrix"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  feature-permutations:
    name: Feature matrix (${{ matrix.feature.name }})
    if: "!startsWith(github.ref, 'refs/tags/')"
    needs: feature-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJson(needs.feature-matrix.outputs.matrix) }}
    services:
      postgres:
        image: postgres
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Install database libraries on Linux
        run: |
          sudo apt-get update --yes
          sudo apt-get install --yes libsqlite3-dev libmysqlclient-dev libpq-dev libssl-dev
      - name: Set up database
        run: |
          # Install cargo-binstall for faster binary installation
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          # Use binstall to get prebuilt diesel_cli binary
          cargo binstall --no-confirm diesel_cli --no-default-features --features postgres
          echo "Creating database"
          PGPASSWORD=postgres createdb -U postgres -h localhost -p 5432 hubuum_rust_test
          echo "Running database setup and migrations"
          diesel migration run --database-url ${{ env.DATABASE_URL }} --locked-schema
          echo "Checking database setup"
          PGPASSWORD=postgres psql -U postgres -h localhost -p 5432 -d hubuum_rust_test -c "select * from users;"
      - name: Build (${{ matrix.feature.name }})
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: "build"
          target: x86_64-unknown-linux-gnu
          toolchain: stable
          args: "${{ matrix.feature.args }} --locked --release"
          strip: true
      - name: Test (${{ matrix.feature.name }})
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: "test -- --database-url ${{ env.DATABASE_URL }}"
          target: x86_64-unknown-linux-gnu
          toolchain: stable
          args: "${{ matrix.feature.args }} --locked --release"

  test:
    name: Cross-platform (${{ matrix.platform.os_name }}, rust ${{ matrix.toolchain }})
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bin: hubuum
            name: hubuum-Linux-x86_64-gnu.tar.gz
          - os_name: Linux-aarch64
            os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            bin: hubuum
            name: hubuum-Linux-aarch64-gnu.tar.gz
            skip_tests: true
          #- os_name: Linux-arm
          #  os: ubuntu-22.04
          #  target: arm-unknown-linux-gnueabi
          #  bin: hubuum
          #  name: hubuum-Linux-arm-gnu.tar.gz
          #  skip_tests: true
#          - os_name: Linux-i686
#            os: ubuntu-24.04
#            target: i686-unknown-linux-gnu
#            bin: hubuum
#            name: hubuum-Linux-i686-gnu.tar.gz
#            skip_tests: true
#          - os_name: Linux-powerpc
#            os: ubuntu-20.04
#            target: powerpc-unknown-linux-gnu
#            bin: hubuum
#            name: hubuum-Linux-powerpc-gnu.tar.gz
#            skip_tests: true
#          - os_name: Linux-powerpc64
#            os: ubuntu-20.04
#            target: powerpc64-unknown-linux-gnu
#            bin: hubuum
#            name: hubuum-Linux-powerpc64-gnu.tar.gz
#            skip_tests: true
#          - os_name: Linux-powerpc64le
#            os: ubuntu-24.04
#            target: powerpc64le-unknown-linux-gnu
#            bin: hubuum
#            name: hubuum-Linux-powerpc64le.tar.gz
#            skip_tests: true
#          - os_name: Linux-riscv64
#            os: ubuntu-20.04
#            target: riscv64gc-unknown-linux-gnu
#            bin: hubuum
#            name: hubuum-Linux-riscv64gc-gnu.tar.gz
#          - os_name: Linux-s390x
#            os: ubuntu-24.04
#            target: s390x-unknown-linux-gnu
#            bin: hubuum
#            name: hubuum-Linux-s390x-gnu.tar.gz
#            skip_tests: true
#          - os_name: NetBSD-x86_64
#            os: ubuntu-20.04
#            target: x86_64-unknown-netbsd
#            bin: hubuum
#            name: hubuum-NetBSD-x86_64.tar.gz
#            skip_tests: true
          # - os_name: Windows-aarch64
          #   os: windows-latest
          #   target: aarch64-pc-windows-msvc
          #   bin: hubuum.exe
          #   name: hubuum-Windows-aarch64.zip
          #   skip_tests: true
          # - os_name: Windows-i686
          #   os: windows-latest
          #   target: i686-pc-windows-msvc
          #   bin: hubuum.exe
          #   name: hubuum-Windows-i686.zip
          #   skip_tests: true
          # - os_name: Windows-x86_64
          #   os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   bin: hubuum.exe
          #   name: hubuum-Windows-x86_64.zip
          # - os_name: macOS-x86_64
          #   os: macOS-latest
          #   target: x86_64-apple-darwin
          #   bin: hubuum
          #   name: hubuum-Darwin-x86_64.tar.gz
          # - os_name: macOS-aarch64
          #   os: macOS-latest
          #   target: aarch64-apple-darwin
          #   bin: hubuum
          #   name: hubuum-Darwin-aarch64.tar.gz
          #   skip_tests: true
        toolchain:
          - stable
          - beta
          - nightly
    services:
      postgres:
        image: postgres
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Set up database
        run: |
          # Install cargo-binstall for faster binary installation
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          # Use binstall to get prebuilt diesel_cli binary
          cargo binstall --no-confirm diesel_cli --no-default-features --features postgres
          echo "Creating database"
          PGPASSWORD=postgres createdb -U postgres -h localhost -p 5432 hubuum_rust_test
          echo "Running database setup and migrations"
          diesel migration run --database-url ${{ env.DATABASE_URL }} --locked-schema
          echo "Checking database setup"
          PGPASSWORD=postgres psql -U postgres -h localhost -p 5432 -d hubuum_rust_test -c "select * from users;"
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - name: Install Linux dependencies
        run: |
          sudo apt-get update --yes
          packages=(libsqlite3-dev libmysqlclient-dev libpq-dev)
          if [[ "${{ matrix.platform.name }}" == *"musl"* ]]; then
            packages+=(musl-tools)
          fi
          sudo apt-get install --yes "${packages[@]}"
        if: contains(matrix.platform.os, 'ubuntu')
      - name: Build binary with rustls feature enabled
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: "build"
          target: ${{ matrix.platform.target }}
          toolchain: ${{ matrix.toolchain }}
          args: "-F tls-rustls --locked --release"
          strip: true
      - name: Run tests      
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: "test -- --database-url ${{ env.DATABASE_URL }}"
          target: ${{ matrix.platform.target }}
          toolchain: ${{ matrix.toolchain }}
          args: "--locked --release"
        if: ${{ !matrix.platform.skip_tests }}

  verify-tag-main-ci-success:
    name: Verify tagged commit already passed CI on main
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check for successful main CI run on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/ci.yml/runs?event=push&branch=main&head_sha=${SHA}&status=completed&per_page=100"

          response="$(
            curl --silent --show-error --fail \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              "$api"
          )"

          successful_run_count="$(
            jq '[.workflow_runs[] | select(.head_branch == "main" and .conclusion == "success")] | length' <<<"$response"
          )"

          if [[ "$successful_run_count" -eq 0 ]]; then
            echo "No successful CI run on main was found for commit ${SHA}. Tag releases must point at a green main commit." >&2
            exit 1
          fi

          echo "Found successful CI run on main for ${SHA}"

  validate-tag-release:
    name: Validate tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify-tag-main-ci-success
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Make release scripts executable
        run: chmod +x scripts/*.sh
      - name: Check release metadata
        run: ./scripts/check-release-readiness.sh "${GITHUB_REF_NAME}"

  build-tag-artifacts:
    name: Build release artifacts (${{ matrix.platform.name }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-tag-release
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux-x86_64
            target: x86_64-unknown-linux-gnu
            os_name: linux-x86_64
          - name: Linux-aarch64
            target: aarch64-unknown-linux-gnu
            os_name: linux-aarch64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Install database libraries on Linux
        run: |
          sudo apt-get update --yes
          sudo apt-get install --yes libsqlite3-dev libmysqlclient-dev libpq-dev libssl-dev
      - name: Build release binaries
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          target: ${{ matrix.platform.target }}
          toolchain: stable
          args: "-F tls-rustls --locked --release"
          strip: true
      - name: Package release archive
        shell: bash
        run: |
          mkdir -p dist
          archive_name="hubuum-${{ matrix.platform.os_name }}-tls-rustls-${GITHUB_REF_NAME}.tar.gz"
          tar czvf "dist/${archive_name}" -C "target/${{ matrix.platform.target }}/release" hubuum-server hubuum-admin
          shasum -a 256 "dist/${archive_name}" > "dist/${archive_name}.sha256"
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.os_name }}
          path: dist/*

  publish-github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-tag-artifacts
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist
      - name: Make release scripts executable
        run: chmod +x scripts/*.sh
      - name: Build release notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          ./scripts/extract-changelog-section.sh "$version" > /tmp/release-notes.md
          test -s /tmp/release-notes.md
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Hubuum ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: /tmp/release-notes.md
          files: dist/*

  build-main-artifacts:
    name: Build main artifacts (${{ matrix.platform.os_name }}, ${{ matrix.feature.ext }})
    if: github.ref == 'refs/heads/main'
    needs:
      - lint
      - release-metadata
      - openapi-contract
      - feature-permutations
      - test
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: x86_64-unknown-linux-gnu
            os_name: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os_name: linux-aarch64
        feature:
          - extra_args: "--no-default-features"
            ext: no-tls
          - extra_args: "-F tls-openssl"
            ext: tls-openssl
          - extra_args: "-F tls-rustls"
            ext: tls-rustls
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Install database libraries on Linux
        run: |
          sudo apt-get update --yes
          sudo apt-get install --yes libsqlite3-dev libmysqlclient-dev libpq-dev libssl-dev
      - name: Build main binaries
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          target: ${{ matrix.platform.target }}
          toolchain: stable
          args: "${{ matrix.feature.extra_args }} --locked --release"
          strip: true
      - name: Package main archive
        shell: bash
        run: |
          mkdir -p dist
          archive_name="hubuum-${{ matrix.platform.os_name }}-${{ matrix.feature.ext }}-main.tar.gz"
          tar czvf "dist/${archive_name}" -C "target/${{ matrix.platform.target }}/release" hubuum-server hubuum-admin
      - name: Upload main artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-${{ matrix.platform.os_name }}-${{ matrix.feature.ext }}
          path: dist/*

  publish-main-release:
    name: Publish main-latest artifacts
    if: github.ref == 'refs/heads/main'
    needs: build-main-artifacts
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download main artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: main-*
          merge-multiple: true
          path: dist
      - name: Publish main-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: Main build
          body: Automatically published build for the `main` branch.
          draft: false
          prerelease: false
          files: dist/*

  publish-main-container-images:
    name: Build main container (${{ matrix.variant.name }}, ${{ matrix.platform.arch }})
    if: github.ref == 'refs/heads/main'
    needs:
      - lint
      - release-metadata
      - openapi-contract
      - feature-permutations
      - test
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: full
            build_args: "-F tls-rustls -F tls-openssl"
          - name: rustls-only
            build_args: "-F tls-rustls"
        platform:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push platform-specific image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/${{ matrix.platform.arch }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hubuum-server:main-${{ matrix.variant.name }}-${{ matrix.platform.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          build-args: |
            CARGO_BUILD_FLAGS=${{ matrix.variant.build_args }} --locked --release
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-main-container-manifests:
    name: Create main multi-arch manifest (${{ matrix.variant.name }})
    if: github.ref == 'refs/heads/main'
    needs: publish-main-container-images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: full
          - name: rustls-only
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/hubuum-server"
          variant="${{ matrix.variant.name }}"
          
          # Determine final tags
          if [[ "$variant" == "full" ]]; then
            final_tags=("${image}:main" "${image}:main-full")
          else
            final_tags=("${image}:main-${variant}")
          fi
          
          # Create and push manifest for each tag
          for tag in "${final_tags[@]}"; do
            docker buildx imagetools create -t "$tag" \
              "${image}:main-${variant}-amd64" \
              "${image}:main-${variant}-arm64"
          done

  publish-tag-container-images:
    name: Build release container (${{ matrix.variant.name }}, ${{ matrix.platform.arch }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-tag-release
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: full
            build_args: "-F tls-rustls -F tls-openssl"
          - name: rustls-only
            build_args: "-F tls-rustls"
        platform:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Make release scripts executable
        run: chmod +x scripts/*.sh
      - name: Check tagged release metadata
        run: ./scripts/check-release-readiness.sh "${GITHUB_REF_NAME}"
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push platform-specific image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/${{ matrix.platform.arch }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hubuum-server:${{ github.ref_name }}-${{ matrix.variant.name }}-${{ matrix.platform.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          build-args: |
            CARGO_BUILD_FLAGS=${{ matrix.variant.build_args }} --locked --release
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-tag-container-manifests:
    name: Create release multi-arch manifest (${{ matrix.variant.name }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-tag-container-images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: full
          - name: rustls-only
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/hubuum-server"
          version_tag="${GITHUB_REF_NAME}"
          version="${version_tag#v}"
          variant="${{ matrix.variant.name }}"
          
          # Determine final tags
          if [[ "$variant" == "full" ]]; then
            final_tags=(
              "${image}:${version_tag}"
              "${image}:${version}"
              "${image}:${version_tag}-full"
              "${image}:${version}-full"
            )
          else
            final_tags=(
              "${image}:${version_tag}-${variant}"
              "${image}:${version}-${variant}"
            )
          fi
          
          # Create and push manifest for each tag
          for tag in "${final_tags[@]}"; do
            docker buildx imagetools create -t "$tag" \
              "${image}:${version_tag}-${variant}-amd64" \
              "${image}:${version_tag}-${variant}-arm64"
          done
          build-args: |
            CARGO_BUILD_FLAGS=${{ matrix.variant.build_args }} --locked --release
