name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CRATE_NAME: hubuum
  GITHUB_TOKEN: ${{ github.token }}
  RUST_BACKTRACE: 1
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/hubuum_rust_test
  HUBUUM_DATABASE_URL: postgres://postgres:postgres@localhost:5432/hubuum_rust_test
  HUBUUM_DB_TEST_PASSWORD: postgres

jobs:
  lint:
    name: Lint
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install clippy
        run: rustup component add clippy
      - name: Install feature build dependencies
        run: |
          sudo apt-get update --yes
          sudo apt-get install --yes libssl-dev
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run clippy with all features
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Check Docker workspace manifest parity
        run: cargo test --bin hubuum-server dockerfile_copies_every_workspace_manifest --locked
      - name: Test deployment script refresh
        run: bash scripts/test-install-script-refresh.sh
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          config: '.markdownlint.json'
          globs: '**/*.md'

  release-metadata:
    name: Release metadata
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Make release scripts executable
        run: chmod +x scripts/*.sh
      - name: Check version bump hygiene
        run: ./scripts/check-version-bump.sh

  openapi-contract:
    name: OpenAPI contract
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Generate OpenAPI JSON
        run: cargo run --bin hubuum-openapi --locked > /tmp/openapi.json
      - name: Validate OpenAPI semantics
        run: "cargo test --lib 'api::openapi::tests::' --locked"
      - name: Check OpenAPI drift
        id: openapi_drift
        continue-on-error: true
        shell: bash
        run: |
          if diff -u docs/openapi.json /tmp/openapi.json > /tmp/openapi.diff; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
      - name: Flag OpenAPI drift
        if: steps.openapi_drift.outputs.drift == 'true'
        shell: bash
        run: |
          echo "::warning title=OpenAPI drift detected::Generated OpenAPI differs from docs/openapi.json. Build and publish continue, but docs/openapi.json should be updated."
          {
            echo "### OpenAPI drift detected"
            echo ""
            echo "Generated OpenAPI differs from \`docs/openapi.json\`."
            echo "Build and publish continue, but the spec file should be refreshed and committed."
            echo ""
            echo "<details><summary>Diff (first 200 lines)</summary>"
            echo ""
            echo '```diff'
            sed -n '1,200p' /tmp/openapi.diff
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload OpenAPI drift diff
        if: steps.openapi_drift.outputs.drift == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: openapi-diff
          path: /tmp/openapi.diff
      - name: Prepare OpenAPI artifact
        run: cp /tmp/openapi.json openapi.json
      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v7
        with:
          name: openapi-json
          path: openapi.json

  feature-permutations:
    name: Feature smoke (${{ matrix.feature.name }})
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        feature:
          - name: default
            args: ""
          - name: no-default-features
            args: "--no-default-features"
          - name: rustls-no-openssl
            args: "--no-default-features -F tls-rustls"
          - name: all-features
            args: "--all-features"
    services:
      postgres:
        image: postgres
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Install database libraries on Linux
        run: |
          sudo apt-get update --yes
          sudo apt-get install --yes libsqlite3-dev libmysqlclient-dev libpq-dev libssl-dev
      - name: Set up database
        run: |
          # Install cargo-binstall for faster binary installation
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          # Use binstall to get prebuilt diesel_cli binary (includes postgres support)
          cargo binstall --no-confirm diesel_cli
          CARGO_BIN="${CARGO_HOME:-$HOME/.cargo}/bin"
          export PATH="$CARGO_BIN:$PATH"
          DIESEL_BIN="$(command -v diesel || true)"
          if [[ -z "$DIESEL_BIN" ]]; then
            DIESEL_BIN="$CARGO_BIN/diesel"
          fi
          if [[ ! -x "$DIESEL_BIN" ]]; then
              echo "diesel binary missing after binstall; falling back to cargo install"
              cargo install --locked diesel_cli --no-default-features --features postgres
              DIESEL_BIN="$CARGO_BIN/diesel"
            fi
            if [[ ! -x "$DIESEL_BIN" ]]; then
              echo "diesel binary not found after fallback install; expected at $DIESEL_BIN" >&2
              exit 1
          fi
          echo "Creating database"
          PGPASSWORD=postgres createdb -U postgres -h localhost -p 5432 hubuum_rust_test
          echo "Running database setup and migrations"
          "$DIESEL_BIN" migration run --database-url ${{ env.DATABASE_URL }}
          echo "Checking database setup"
          PGPASSWORD=postgres psql -U postgres -h localhost -p 5432 -d hubuum_rust_test -c "select * from users;"
      - name: Build (${{ matrix.feature.name }})
        run: cargo build ${{ matrix.feature.args }} --locked --release
      - name: Test (${{ matrix.feature.name }})
        run: cargo test ${{ matrix.feature.args }} -F integration-test-support --locked --release

  valkey-rate-limit-contract:
    name: Valkey login limiter contract
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    services:
      valkey:
        image: valkey/valkey:9-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Run the shared limiter contract
        run: >-
          cargo test --locked --lib
          'middlewares::rate_limit::tests::' -- --ignored

  test:
    name: ${{ matrix.platform.os_name }}, rust ${{ matrix.toolchain }}
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os_name: Linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - os_name: macOS
            os: macos-latest
            target: aarch64-apple-darwin
        toolchain:
          - stable
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.platform.target }}-${{ matrix.toolchain }}-release
      
      - name: Install Linux dependencies
        if: contains(matrix.platform.os, 'ubuntu')
        run: |
          sudo apt-get update --yes
          sudo apt-get install --yes libsqlite3-dev libmysqlclient-dev libpq-dev libssl-dev postgresql postgresql-client
          # Start postgres
          sudo systemctl start postgresql
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
      
      - name: Install macOS dependencies
        if: contains(matrix.platform.os, 'macos')
        run: |
          brew install postgresql@17
          PG_BIN="$(brew --prefix postgresql@17)/bin"
          echo "$PG_BIN" >> "$GITHUB_PATH"
          export PATH="$PG_BIN:$PATH"
          # Initialize and start postgres (creates user matching system user)
          brew services start postgresql@17
          # Wait for postgres to be ready
          max_attempts=30
          attempt=0
          until "$PG_BIN/pg_isready" -q || [ $attempt -eq $max_attempts ]; do
            echo "Waiting for PostgreSQL to be ready... (attempt $((attempt+1))/$max_attempts)"
            sleep 1
            attempt=$((attempt+1))
          done
          # Create postgres superuser with password
          "$PG_BIN/createuser" -s postgres
          "$PG_BIN/psql" -d postgres -c "ALTER USER postgres PASSWORD 'postgres';"

      - name: Install Windows PostgreSQL libraries
        if: contains(matrix.platform.os, 'windows')
        shell: pwsh
        run: |
          choco install postgresql --params '"/Password:postgres"' --no-progress -y
          $pgRoot = Get-ChildItem 'C:\Program Files\PostgreSQL' -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $pgRoot) { throw 'PostgreSQL installation directory not found' }
          $binPath = Join-Path $pgRoot.FullName 'bin'
          $libPath = Join-Path $pgRoot.FullName 'lib'
          if (-not (Test-Path (Join-Path $binPath 'pg_isready.exe'))) { throw "PostgreSQL client tools not found in $binPath" }
          if (-not (Test-Path (Join-Path $libPath 'libpq.lib'))) { throw "libpq.lib not found in $libPath" }
          "$binPath" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          "PG_BIN=$binPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LIB=$libPath;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8          

      - name: Set up database (Linux/macOS)
        if: "!contains(matrix.platform.os, 'windows')"
        run: |
          # Install cargo-binstall for faster binary installation
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          # Use binstall to get prebuilt diesel_cli binary (includes postgres support)
          cargo binstall --no-confirm diesel_cli --force
          CARGO_BIN="${CARGO_HOME:-$HOME/.cargo}/bin"
          export PATH="$CARGO_BIN:$PATH"
          DIESEL_BIN="$(command -v diesel || true)"
          if [[ -z "$DIESEL_BIN" ]]; then
            DIESEL_BIN="$CARGO_BIN/diesel"
          fi
          if [[ ! -x "$DIESEL_BIN" ]]; then
              echo "diesel binary missing after binstall; falling back to cargo install"
              cargo install --locked diesel_cli --no-default-features --features postgres
              DIESEL_BIN="$CARGO_BIN/diesel"
            fi
            if [[ ! -x "$DIESEL_BIN" ]]; then
              echo "diesel binary not found after fallback install; expected at $DIESEL_BIN" >&2
              exit 1
          fi
          echo "Creating database"
          PGPASSWORD=postgres createdb -U postgres -h localhost -p 5432 hubuum_rust_test
          echo "Running database setup and migrations"
          "$DIESEL_BIN" migration run --database-url ${{ env.DATABASE_URL }}
          echo "Checking database setup"
          PGPASSWORD=postgres psql -U postgres -h localhost -p 5432 -d hubuum_rust_test -c "select * from users;"

      - name: Set up database (Windows)
        if: contains(matrix.platform.os, 'windows')
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:PG_BIN) { throw 'PG_BIN is not set' }

          # Use an isolated cluster to avoid runner service credentials/state drift.
          $pgData = Join-Path $env:RUNNER_TEMP 'postgres-data'
          $pgLog = Join-Path $env:RUNNER_TEMP 'postgres.log'
          $pgPort = 55432

          if (Test-Path $pgData) {
            Remove-Item -Recurse -Force $pgData
          }

          & "$env:PG_BIN\initdb.exe" -D $pgData -U postgres -A trust --encoding=UTF8
          & "$env:PG_BIN\pg_ctl.exe" -D $pgData -l $pgLog -o "-p $pgPort" -w -t 60 start

          $isReady = $false
          $maxAttempts = 30
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            & "$env:PG_BIN\pg_isready.exe" -q -h 127.0.0.1 -p $pgPort
            if ($LASTEXITCODE -eq 0) {
              $isReady = $true
              break
            }
            Write-Host "Waiting for PostgreSQL to be ready... (attempt $attempt/$maxAttempts)"
            Start-Sleep -Seconds 1
          }
          if (-not $isReady) { throw 'PostgreSQL did not become ready in time' }

          $dbUrl = "postgres://postgres@127.0.0.1:$pgPort/hubuum_rust_test"
          "DATABASE_URL=$dbUrl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "HUBUUM_DATABASE_URL=$dbUrl" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PG_TEST_PORT=$pgPort" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PG_LOG=$pgLog" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          # Install Diesel CLI via official installer script.
          irm https://github.com/diesel-rs/diesel/releases/latest/download/diesel_cli-installer.ps1 | iex
          $dieselBin = Join-Path $env:USERPROFILE '.cargo\bin\diesel.exe'
          if (-not (Test-Path $dieselBin)) { throw "Diesel CLI not found at $dieselBin" }
          "DIESEL_BIN=$dieselBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          & "$env:PG_BIN\createdb.exe" -U postgres -h 127.0.0.1 -p $pgPort hubuum_rust_test
          & $dieselBin migration run --database-url "$dbUrl"
          & "$env:PG_BIN\psql.exe" -U postgres -h 127.0.0.1 -p $pgPort -d hubuum_rust_test -c "select * from users;"
      
      - name: Build (non-Windows)
        if: "!contains(matrix.platform.os, 'windows')"
        run: cargo build --no-default-features -F production-all --locked --release

      - name: Build (Windows)
        if: contains(matrix.platform.os, 'windows')
        run: cargo build -F tls-rustls,amqp,email,valkey --locked --release --target ${{ matrix.platform.target }}
      
      - name: Run tests (non-Windows, all features)
        if: "!contains(matrix.platform.os, 'windows')"
        run: cargo test --all-features --locked --release

      - name: Run tests (Windows, full release feature set)
        if: contains(matrix.platform.os, 'windows')
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $testArgs = @(
            'test',
            '-F', 'tls-rustls,amqp,email,valkey,integration-test-support',
            '--locked',
            '--release',
            '--target', '${{ matrix.platform.target }}'
          )

          & cargo @testArgs
          $firstExitCode = $LASTEXITCODE
          if ($firstExitCode -eq 0) {
            exit 0
          }

          Write-Warning "Windows tests failed with exit code $firstExitCode; resetting PostgreSQL and retrying once."
          if (Test-Path $env:PG_LOG) {
            Write-Host 'Last 200 lines of the PostgreSQL log:'
            Get-Content -Path $env:PG_LOG -Tail 200
          } else {
            Write-Warning "PostgreSQL log not found at $env:PG_LOG"
          }

          & "$env:PG_BIN\dropdb.exe" --if-exists --force -U postgres -h 127.0.0.1 -p $env:PG_TEST_PORT hubuum_rust_test
          if ($LASTEXITCODE -ne 0) { throw "dropdb failed with exit code $LASTEXITCODE" }

          & "$env:PG_BIN\createdb.exe" -U postgres -h 127.0.0.1 -p $env:PG_TEST_PORT hubuum_rust_test
          if ($LASTEXITCODE -ne 0) { throw "createdb failed with exit code $LASTEXITCODE" }

          & $env:DIESEL_BIN migration run --database-url $env:DATABASE_URL
          if ($LASTEXITCODE -ne 0) { throw "Diesel migrations failed with exit code $LASTEXITCODE" }

          & cargo @testArgs
          exit $LASTEXITCODE

  all-features-release-build:
    name: Release build with all production features
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Install release build dependencies
        run: |
          sudo apt-get update --yes
          sudo apt-get install --yes libsqlite3-dev libmysqlclient-dev libpq-dev libssl-dev
      - name: Build release binaries with all production features
        run: cargo build --no-default-features -F production-all --locked --release

  container-build:
    name: Container build (production features)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18.4@sha256:22c89fe0d0f507606260237fd55e51f6137f58b2d5bcf6152242b96d9fe8f9a4
        env:
          POSTGRES_DB: hubuum_container_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hubuum_container_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build production container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          tags: hubuum-server:ci
          build-args: |
            CARGO_BUILD_FLAGS=-F tls-rustls -F tls-openssl --locked --release
            HUBUUM_BUILD_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Export static release binaries
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: release-artifacts
          outputs: type=local,dest=dist/release-smoke
          build-args: |
            CARGO_BUILD_FLAGS=-F tls-rustls -F tls-openssl --locked --release
            HUBUUM_BUILD_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
      - name: Verify exported release binaries
        run: |
          for binary in dist/release-smoke/hubuum-server dist/release-smoke/hubuum-admin; do
            if readelf --dynamic "$binary" | grep --quiet '(NEEDED)'; then
              echo "$binary unexpectedly has dynamic runtime dependencies" >&2
              readelf --dynamic "$binary" >&2
              exit 1
            fi
            "$binary" --version
          done
      - name: Test embedded database migrations and readiness
        env:
          IMAGE: hubuum-server:ci
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/hubuum_container_test?sslmode=disable
        run: |
          docker run --rm --entrypoint hubuum-admin "$IMAGE" --help \
            | grep --quiet -- "--migrate"
          if docker run --rm --network host \
            --entrypoint hubuum-admin \
            --env HUBUUM_DATABASE_URL="$DATABASE_URL" \
            "$IMAGE" --database-ready; then
            echo "database readiness unexpectedly accepted an unmigrated schema" >&2
            exit 1
          fi
          docker run --rm --network host \
            --entrypoint hubuum-admin \
            --env HUBUUM_DATABASE_URL="$DATABASE_URL" \
            "$IMAGE" --migrate
          docker run --rm --network host \
            --entrypoint hubuum-admin \
            --env HUBUUM_DATABASE_URL="$DATABASE_URL" \
            "$IMAGE" --database-ready
          test "$(docker run --rm --network host \
            --env PGPASSWORD=postgres \
            postgres:18.4@sha256:22c89fe0d0f507606260237fd55e51f6137f58b2d5bcf6152242b96d9fe8f9a4 psql \
            --host 127.0.0.1 \
            --username postgres \
            --dbname hubuum_container_test \
            --tuples-only \
            --no-align \
            --command "SELECT to_regclass('public.users') IS NOT NULL")" = "t"
          container_id="$(docker run --rm --detach --network host \
            --env HUBUUM_DATABASE_URL="$DATABASE_URL" \
            --env HUBUUM_BIND_IP=127.0.0.1 \
            "$IMAGE")"
          trap 'docker stop "$container_id"' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/readyz; then
              break
            fi
            if [[ "$attempt" == 30 ]]; then
              docker logs "$container_id"
              exit 1
            fi
            sleep 1
          done

  verify-tag-main-ci-success:
    name: Verify tagged commit already passed CI on main
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check for successful main CI run on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/ci.yml/runs?event=push&branch=main&head_sha=${SHA}&status=completed&per_page=100"

          response="$(
            curl --silent --show-error --fail \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              "$api"
          )"

          successful_run_count="$(
            jq '[.workflow_runs[] | select(.head_branch == "main" and .conclusion == "success")] | length' <<<"$response"
          )"

          if [[ "$successful_run_count" -eq 0 ]]; then
            echo "No successful CI run on main was found for commit ${SHA}. Tag releases must point at a green main commit." >&2
            exit 1
          fi

          echo "Found successful CI run on main for ${SHA}"

  validate-tag-release:
    name: Validate tagged release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify-tag-main-ci-success
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
      - name: Make release scripts executable
        run: chmod +x scripts/*.sh
      - name: Check release metadata
        run: ./scripts/check-release-readiness.sh "${GITHUB_REF_NAME}"

  build-tag-linux-artifacts:
    name: Build static release artifacts (${{ matrix.platform.name }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-tag-release
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux-x86_64
            arch: amd64
            os_name: linux-x86_64
            runner: ubuntu-24.04
          - name: Linux-aarch64
            arch: arm64
            os_name: linux-aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      - name: Export stripped static binaries
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: release-artifacts
          platforms: linux/${{ matrix.platform.arch }}
          outputs: type=local,dest=dist/bin
          build-args: |
            CARGO_BUILD_FLAGS=--no-default-features --features production-all --locked --release
            HUBUUM_BUILD_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=static-${{ matrix.platform.os_name }}-all-features
          cache-to: type=gha,mode=max,scope=static-${{ matrix.platform.os_name }}-all-features
      - name: Verify static linkage and package release archive
        shell: bash
        run: |
          for binary in dist/bin/hubuum-server dist/bin/hubuum-admin; do
            if readelf --dynamic "$binary" | grep --quiet '(NEEDED)'; then
              echo "$binary unexpectedly has dynamic runtime dependencies" >&2
              readelf --dynamic "$binary" >&2
              exit 1
            fi
            "$binary" --version
          done
          archive_name="hubuum-${{ matrix.platform.os_name }}-all-features-${GITHUB_REF_NAME}.tar.gz"
          tar czvf "dist/${archive_name}" -C dist/bin hubuum-server hubuum-admin
          shasum -a 256 "dist/${archive_name}" > "dist/${archive_name}.sha256"
      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform.os_name }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  build-tag-native-artifacts:
    name: Build native release artifacts (${{ matrix.platform.name }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-tag-release
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows-x86_64
            target: x86_64-pc-windows-msvc
            os_name: windows-x86_64
            runner: windows-latest
          - name: macOS-ARM64
            target: aarch64-apple-darwin
            os_name: macos-aarch64
            runner: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Ensure Rust target is installed
        run: rustup target add ${{ matrix.platform.target }}

      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.platform.target }}-stable-release
      
      - name: Build release binaries (macOS, all production features)
        if: contains(matrix.platform.os_name, 'macos')
        env:
          HUBUUM_BUILD_GIT_SHA: ${{ github.sha }}
        run: cargo build --no-default-features -F production-all --locked --release --target ${{ matrix.platform.target }}

      - name: Build release binaries (Windows, self-contained feature set)
        if: contains(matrix.platform.os_name, 'windows')
        env:
          HUBUUM_BUILD_GIT_SHA: ${{ github.sha }}
        run: cargo build -F tls-rustls,amqp,email,valkey,embedded-migrations,vendored-openssl --locked --release --target ${{ matrix.platform.target }}

      - name: Verify macOS runtime dependencies
        if: contains(matrix.platform.os_name, 'macos')
        shell: bash
        run: |
          for binary in hubuum-server hubuum-admin; do
            binary_path="target/${{ matrix.platform.target }}/release/${binary}"
            "$binary_path" --version
            if xcrun otool -L "$binary_path" | grep --extended-regexp --quiet '(/opt/homebrew|/usr/local/opt|libpq|libssl|libcrypto)'; then
              echo "$binary unexpectedly depends on a package-manager library" >&2
              xcrun otool -L "$binary_path" >&2
              exit 1
            fi
          done

      - name: Verify Windows binaries start without third-party DLLs
        if: contains(matrix.platform.os_name, 'windows')
        shell: pwsh
        run: |
          & "target/${{ matrix.platform.target }}/release/hubuum-server.exe" --version
          & "target/${{ matrix.platform.target }}/release/hubuum-admin.exe" --version
      
      - name: Package release archive (Unix)
        if: contains(matrix.platform.os_name, 'macos')
        shell: bash
        run: |
          mkdir -p dist
          archive_name="hubuum-${{ matrix.platform.os_name }}-all-features-${GITHUB_REF_NAME}.tar.gz"
          tar czvf "dist/${archive_name}" -C "target/${{ matrix.platform.target }}/release" hubuum-server hubuum-admin
          cd dist
          shasum -a 256 "${archive_name}" > "${archive_name}.sha256"
      
      - name: Package release archive (Windows)
        if: contains(matrix.platform.os_name, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          $archive_name = "hubuum-${{ matrix.platform.os_name }}-full-release-${env:GITHUB_REF_NAME}.zip"
          Compress-Archive -Path "target/${{ matrix.platform.target }}/release/hubuum-server.exe", "target/${{ matrix.platform.target }}/release/hubuum-admin.exe" -DestinationPath "dist/$archive_name"
          $hash = (Get-FileHash "dist/$archive_name" -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive_name" | Out-File -FilePath "dist/$archive_name.sha256" -Encoding ascii
      
      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform.os_name }}
          path: dist/*

  publish-github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-tag-linux-artifacts
      - build-tag-native-artifacts
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist
      - name: Make release scripts executable
        run: chmod +x scripts/*.sh
      - name: Build release notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          ./scripts/extract-changelog-section.sh "$version" > /tmp/release-notes.md
          test -s /tmp/release-notes.md
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Hubuum ${{ github.ref_name }}
          draft: false
          prerelease: false
          body_path: /tmp/release-notes.md
          files: dist/*

  build-main-linux-artifacts:
    name: Build static main artifacts (${{ matrix.platform.os_name }}, ${{ matrix.feature.ext }})
    if: github.ref == 'refs/heads/main'
    needs:
      - lint
      - release-metadata
      - openapi-contract
      - feature-permutations
      - test
      - all-features-release-build
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: amd64
            os_name: linux-x86_64
            runner: ubuntu-24.04
          - arch: arm64
            os_name: linux-aarch64
            runner: ubuntu-24.04-arm
        feature:
          - extra_args: "--no-default-features -F production-all"
            ext: all-features
          - extra_args: "--no-default-features"
            ext: no-tls
          - extra_args: "-F tls-openssl"
            ext: tls-openssl
          - extra_args: "-F tls-rustls"
            ext: tls-rustls
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      - name: Export stripped static binaries
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: release-artifacts
          platforms: linux/${{ matrix.platform.arch }}
          outputs: type=local,dest=dist/bin
          build-args: |
            CARGO_BUILD_FLAGS=${{ matrix.feature.extra_args }} --locked --release
            HUBUUM_BUILD_GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=static-${{ matrix.platform.os_name }}-${{ matrix.feature.ext }}
          cache-to: type=gha,mode=max,scope=static-${{ matrix.platform.os_name }}-${{ matrix.feature.ext }}
      - name: Verify static linkage and package main archive
        shell: bash
        run: |
          for binary in dist/bin/hubuum-server dist/bin/hubuum-admin; do
            if readelf --dynamic "$binary" | grep --quiet '(NEEDED)'; then
              echo "$binary unexpectedly has dynamic runtime dependencies" >&2
              readelf --dynamic "$binary" >&2
              exit 1
            fi
            "$binary" --version
          done
          archive_name="hubuum-${{ matrix.platform.os_name }}-${{ matrix.feature.ext }}-main.tar.gz"
          tar czvf "dist/${archive_name}" -C dist/bin hubuum-server hubuum-admin
          shasum -a 256 "dist/${archive_name}" > "dist/${archive_name}.sha256"
      - name: Upload main artifact
        uses: actions/upload-artifact@v7
        with:
          name: main-${{ matrix.platform.os_name }}-${{ matrix.feature.ext }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  build-main-native-artifacts:
    name: Build native main artifacts (${{ matrix.platform.os_name }}, ${{ matrix.feature.ext }})
    if: github.ref == 'refs/heads/main'
    needs:
      - lint
      - release-metadata
      - openapi-contract
      - feature-permutations
      - test
      - all-features-release-build
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - target: x86_64-pc-windows-msvc
            os_name: windows-x86_64
            runner: windows-latest
          - target: aarch64-apple-darwin
            os_name: macos-aarch64
            runner: macos-latest
        feature:
          - extra_args: "--no-default-features -F production-all"
            ext: all-features
          - extra_args: "--no-default-features"
            ext: no-tls
          - extra_args: "-F tls-openssl"
            ext: tls-openssl
          - extra_args: "-F tls-rustls"
            ext: tls-rustls
        exclude:
          - platform: { os_name: windows-x86_64 }
            feature: { ext: tls-openssl }
          - platform: { os_name: windows-x86_64 }
            feature: { ext: all-features }
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Ensure Rust target is installed
        run: rustup target add ${{ matrix.platform.target }}
      - name: Cache cargo & target directories
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.platform.target }}-stable-release
      - name: Build self-contained main binaries
        env:
          HUBUUM_BUILD_GIT_SHA: ${{ github.sha }}
        run: cargo build ${{ matrix.feature.extra_args }} -F embedded-migrations,vendored-openssl --locked --release --target ${{ matrix.platform.target }}
      - name: Verify macOS runtime dependencies
        if: contains(matrix.platform.os_name, 'macos')
        shell: bash
        run: |
          for binary in hubuum-server hubuum-admin; do
            binary_path="target/${{ matrix.platform.target }}/release/${binary}"
            "$binary_path" --version
            if xcrun otool -L "$binary_path" | grep --extended-regexp --quiet '(/opt/homebrew|/usr/local/opt|libpq|libssl|libcrypto)'; then
              echo "$binary unexpectedly depends on a package-manager library" >&2
              xcrun otool -L "$binary_path" >&2
              exit 1
            fi
          done
      - name: Verify Windows binaries start without third-party DLLs
        if: contains(matrix.platform.os_name, 'windows')
        shell: pwsh
        run: |
          & "target/${{ matrix.platform.target }}/release/hubuum-server.exe" --version
          & "target/${{ matrix.platform.target }}/release/hubuum-admin.exe" --version
      - name: Package main archive (macOS)
        if: contains(matrix.platform.os_name, 'macos')
        shell: bash
        run: |
          mkdir -p dist
          archive_name="hubuum-${{ matrix.platform.os_name }}-${{ matrix.feature.ext }}-main.tar.gz"
          tar czvf "dist/${archive_name}" -C "target/${{ matrix.platform.target }}/release" hubuum-server hubuum-admin
          shasum -a 256 "dist/${archive_name}" > "dist/${archive_name}.sha256"
      - name: Package main archive (Windows)
        if: contains(matrix.platform.os_name, 'windows')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          $archive_name = "hubuum-${{ matrix.platform.os_name }}-${{ matrix.feature.ext }}-main.zip"
          Compress-Archive -Path "target/${{ matrix.platform.target }}/release/hubuum-server.exe", "target/${{ matrix.platform.target }}/release/hubuum-admin.exe" -DestinationPath "dist/$archive_name"
          $hash = (Get-FileHash "dist/$archive_name" -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive_name" | Out-File -FilePath "dist/$archive_name.sha256" -Encoding ascii
      - name: Upload main artifact
        uses: actions/upload-artifact@v7
        with:
          name: main-${{ matrix.platform.os_name }}-${{ matrix.feature.ext }}
          path: dist/*

  publish-main-release:
    name: Publish main-latest artifacts
    if: github.ref == 'refs/heads/main'
    needs:
      - build-main-linux-artifacts
      - build-main-native-artifacts
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download main artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: main-*
          merge-multiple: true
          path: dist
      - name: Publish main-latest release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: main-latest
          name: Main build
          body: Automatically published build for the `main` branch.
          draft: false
          prerelease: false
          files: dist/*

  publish-main-container-images:
    name: Build main container (${{ matrix.platform.arch }})
    if: github.ref == 'refs/heads/main'
    needs:
      - lint
      - release-metadata
      - openapi-contract
      - feature-permutations
      - test
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push platform-specific image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/${{ matrix.platform.arch }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hubuum-server:main-full-${{ matrix.platform.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          build-args: |
            CARGO_BUILD_FLAGS=-F tls-rustls -F tls-openssl --locked --release
            HUBUUM_BUILD_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-main-container-manifests:
    name: Create main multi-arch manifest
    if: github.ref == 'refs/heads/main'
    needs: publish-main-container-images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/hubuum-server"
          final_tags=("${image}:main" "${image}:main-full")
          
          # Create and push manifest for each tag
          for tag in "${final_tags[@]}"; do
            docker buildx imagetools create -t "$tag" \
              "${image}:main-full-amd64" \
              "${image}:main-full-arm64"
          done

  publish-tag-container-images:
    name: Build release container (${{ matrix.platform.arch }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-tag-release
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Make release scripts executable
        run: chmod +x scripts/*.sh
      - name: Check tagged release metadata
        run: ./scripts/check-release-readiness.sh "${GITHUB_REF_NAME}"
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push platform-specific image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/${{ matrix.platform.arch }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hubuum-server:${{ github.ref_name }}-full-${{ matrix.platform.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          build-args: |
            CARGO_BUILD_FLAGS=-F tls-rustls -F tls-openssl --locked --release
            HUBUUM_BUILD_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-tag-container-manifests:
    name: Create release multi-arch manifest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-tag-container-images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/hubuum-server"
          version_tag="${GITHUB_REF_NAME}"
          version="${version_tag#v}"
          final_tags=(
            "${image}:${version_tag}"
            "${image}:${version}"
            "${image}:${version_tag}-full"
            "${image}:${version}-full"
          )
          
          # Create and push manifest for each tag
          for tag in "${final_tags[@]}"; do
            docker buildx imagetools create -t "$tag" \
              "${image}:${version_tag}-full-amd64" \
              "${image}:${version_tag}-full-arm64"
          done
